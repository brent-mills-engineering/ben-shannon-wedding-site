name: Build and deploy site

# Builds the Jekyll site and deploys it to GitHub Pages on every push to main.
# Uses an explicit Ruby + our own Gemfile (Jekyll 4) rather than the
# github-pages gem, so we control the Ruby/Jekyll versions.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Opt the JavaScript actions (checkout, configure-pages, upload/deploy-pages)
# into the Node.js 24 runtime ahead of GitHub's forced switch (mid-June 2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Least-privilege token scoped for Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deployment at a time; don't cancel a running publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true   # bundle install + cache gems

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

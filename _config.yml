# Ben & Shannon's Wedding - Jekyll site config

title: "Ben & Shannon"
tagline: "Groff & Frede Wedding"
description: >-
  The wedding of Benjamin (Ben) Groff and Shannon Frede, Saturday, October 3,
  2026 in Baltimore, Maryland. Ceremony at St. Ignatius Church and reception at
  the Maryland Center for History & Culture. Find the schedule, hotel room
  blocks, travel and parking, and things to do around Baltimore.
lang: en

# Author + default social-preview image feed jekyll-seo-tag.
author:
  name: "Ben Groff & Shannon Frede"
twitter:
  card: summary_large_image
defaults:
  - scope:
      path: ""
    values:
      image: /assets/img/og-image.png

# No custom domain yet (lovegrovebalto.com purchased; DNS propagating). GitHub
# serves a project site at https://<owner>.github.io/ben-shannon-wedding-site/.
# The Actions build injects the base path via --baseurl at build time, and all
# links/assets use `relative_url`, so they resolve at the subpath now and at the
# root domain later. When DNS is live, switch `url` to https://lovegrovebalto.com
# (base path becomes empty automatically) and add a CNAME file.
url: "https://brent-mills-engineering.github.io"
baseurl: ""

# We hand-author all markup; no theme.
theme: null
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

markdown: kramdown
permalink: pretty

# Keep dev cruft and build tooling out of the published site.
exclude:
  - local/
  - README.md
  - PRODUCT.md
  - DESIGN.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .github/
  - "*.log"

sass:
  style: compressed

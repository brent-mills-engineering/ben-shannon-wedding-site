<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
  <head>
    {%- include head.html -%}
  </head>
  <body>
    {%- include header.html -%}
    <main class="site-main">
      <div class="container">
        {%- if page.title -%}
        <header class="page-header">
          <h1>{{ page.title }}</h1>
          {%- if page.subtitle %}<p class="page-subtitle">{{ page.subtitle }}</p>{% endif -%}
        </header>
        {%- endif -%}
        <div class="page-content">
          {{ content }}
        </div>
      </div>
    </main>
    {%- include footer.html -%}
  </body>
</html>

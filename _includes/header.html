<header class="site-header">
  <div class="wrap wrap--page site-header__inner">
    <a class="site-brand" href="{{ '/' | relative_url }}">Ben <span class="amp">&amp;</span> Shannon</a>
    <nav class="site-nav" aria-label="Primary">
      <ul>
        {%- for item in site.data.nav -%}
        <li>
          <a href="{{ item.url | relative_url }}"{% if page.url == item.url %} aria-current="page"{% endif %}>{{ item.title }}</a>
        </li>
        {%- endfor -%}
      </ul>
    </nav>
  </div>
</header>
